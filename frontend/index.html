<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InPlant Chat - 聚合反应釜智能助手</title>
<style>
  :root {
    --bg: #1a1d23;
    --surface: #262a33;
    --surface-hover: #2e3340;
    --border: #333842;
    --text: #e0e2e6;
    --text-secondary: #8b8f98;
    --accent: #4fc3f7;
    --accent-dim: #2563eb;
    --warning: #ff9800;
    --error: #f44336;
    --success: #4caf50;
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    overflow: hidden;
  }

  /* ---- Sidebar ---- */
  .sidebar {
    width: 260px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }

  .sidebar-header {
    padding: 20px;
    border-bottom: 1px solid var(--border);
    font-size: 16px;
    font-weight: 600;
  }

  .sidebar-header .logo { color: var(--accent); }

  .new-chat-btn {
    margin: 12px;
    padding: 10px;
    background: var(--accent-dim);
    color: #fff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    transition: opacity 0.2s;
  }
  .new-chat-btn:hover { opacity: 0.85; }

  .session-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }

  .session-item {
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .session-item:hover { background: var(--surface-hover); color: var(--text); }
  .session-item.active { background: var(--surface-hover); color: var(--text); }

  /* ---- Main Chat Area ---- */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  .chat-header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    font-weight: 600;
    font-size: 15px;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* ---- Message Bubbles ---- */
  .msg {
    max-width: 80%;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .msg.user {
    align-self: flex-end;
    background: var(--accent-dim);
    color: #fff;
    padding: 10px 16px;
    border-radius: var(--radius) var(--radius) 4px var(--radius);
    font-size: 14px;
    line-height: 1.6;
  }

  .msg.assistant {
    align-self: flex-start;
    font-size: 14px;
    line-height: 1.7;
    color: var(--text);
  }

  /* ---- Step Tracker ---- */
  .step-tracker {
    align-self: flex-start;
    max-width: 80%;
    width: 100%;
    margin-bottom: 4px;
  }

  .step-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    margin-bottom: 4px;
    background: var(--surface);
    border-radius: 8px;
    font-size: 13px;
    color: var(--text-secondary);
    transition: all 0.3s;
  }

  .step-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .step-dot.running { background: var(--warning); animation: pulse 1s infinite; }
  .step-dot.completed { background: var(--success); }
  .step-dot.error { background: var(--error); }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  .step-item .step-icon { font-size: 14px; flex-shrink: 0; }

  /* ---- Sources ---- */
  .sources {
    margin-top: 8px;
    padding: 10px 14px;
    background: var(--surface);
    border-radius: 8px;
    border-left: 3px solid var(--accent);
    font-size: 12px;
    color: var(--text-secondary);
  }
  .sources .source-title { font-weight: 600; color: var(--accent); margin-bottom: 4px; }
  .sources .source-item { margin-bottom: 2px; }
  .sources .source-score { color: var(--success); }

  /* ---- Reject Card ---- */
  .reject-card {
    align-self: flex-start;
    max-width: 80%;
    padding: 14px 18px;
    background: var(--surface);
    border: 1px solid var(--warning);
    border-radius: var(--radius);
    font-size: 14px;
    color: var(--warning);
    line-height: 1.6;
  }

  /* ---- Input ---- */
  .input-area {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
  }

  .input-wrapper {
    display: flex;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 12px;
  }

  .input-wrapper textarea {
    flex: 1;
    background: none;
    border: none;
    color: var(--text);
    font-size: 14px;
    resize: none;
    outline: none;
    min-height: 24px;
    max-height: 120px;
    font-family: inherit;
    line-height: 1.5;
  }
  .input-wrapper textarea::placeholder { color: var(--text-secondary); }

  .send-btn {
    background: var(--accent-dim);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 8px 16px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    transition: opacity 0.2s;
    white-space: nowrap;
    align-self: flex-end;
  }
  .send-btn:hover { opacity: 0.85; }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .domain-hint {
    font-size: 11px;
    color: var(--text-secondary);
    text-align: center;
    padding: 8px;
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
  <div class="sidebar-header"><span class="logo">⚙️</span> InPlant Chat</div>
  <button class="new-chat-btn" onclick="newSession()">+ 新建会话</button>
  <div class="session-list" id="sessionList"></div>
</aside>

<!-- Main -->
<div class="main">
  <div class="chat-header" id="chatTitle">聚合反应釜智能助手</div>
  <div class="messages" id="messages">
    <div class="domain-hint">
      当前版本仅支持「聚合反应釜」相关问题的智能问答<br>
      可以询问设备结构、操作规范、故障诊断、传感器数据等
    </div>
  </div>
  <div class="input-area">
    <div class="input-wrapper">
      <textarea id="input" placeholder="输入您的问题，Enter 发送，Shift+Enter 换行" rows="1" onkeydown="onKeyDown(event)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">发送</button>
    </div>
  </div>
</div>

<script>
// ---- State ----
let currentSessionId = null;
let sessions = [];
let isStreaming = false;

// ---- Session Management ----
function newSession() {
  currentSessionId = null;
  document.getElementById('messages').innerHTML = `
    <div class="domain-hint">
      当前版本仅支持「聚合反应釜」相关问题的智能问答<br>
      可以询问设备结构、操作规范、故障诊断、传感器数据等
    </div>`;
  document.getElementById('chatTitle').textContent = '聚合反应釜智能助手';
}

function addSession(id, title) {
  if (!sessions.find(s => s.id === id)) {
    sessions.unshift({ id, title });
  }
  renderSessions();
}

function renderSessions() {
  const list = document.getElementById('sessionList');
  list.innerHTML = sessions.map(s => `
    <div class="session-item${s.id === currentSessionId ? ' active' : ''}" onclick="switchSession('${s.id}')">
      ${escapeHtml(s.title)}
    </div>
  `).join('');
}

function switchSession(id) {
  currentSessionId = id;
  renderSessions();
  // 简化处理：重新加载会话历史
  fetch(`/api/sessions/${id}`)
    .then(r => r.json())
    .then(session => {
      document.getElementById('messages').innerHTML = '';
      session.messages?.forEach(m => renderMessage(m));
    })
    .catch(() => {});
}

// ---- Message Rendering ----
function renderMessage(msg) {
  const container = document.getElementById('messages');
  if (msg.role === 'user') {
    container.appendChild(createBubble('user', msg.content));
  } else if (msg.role === 'assistant') {
    container.appendChild(createBubble('assistant', msg.content));
    if (msg.metadata?.steps) {
      // 已经渲染过步骤的历史消息，不再重复
    }
  }
  scrollToBottom();
}

function createBubble(role, content) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = content;
  return div;
}

// ---- Step Tracker ----
let stepTracker = null;
let stepItems = new Map();
let answerEl = null;

function ensureStepTracker() {
  if (!stepTracker) {
    stepTracker = document.createElement('div');
    stepTracker.className = 'step-tracker';
    document.getElementById('messages').appendChild(stepTracker);
  }
  return stepTracker;
}

function updateStep(step) {
  const tracker = ensureStepTracker();

  if (step.type === 'answer') {
    // remove step tracker, replace with answer bubble
    if (stepTracker) {
      stepTracker.remove();
      stepTracker = null;
      stepItems.clear();
    }
    if (!answerEl) {
      answerEl = document.createElement('div');
      answerEl.className = 'msg assistant';
      document.getElementById('messages').appendChild(answerEl);
    }
    if (step.status === 'error') {
      answerEl.textContent = step.content || '处理请求时出错，请重试';
    }
    return;
  }

  const key = `${step.type}-${step.name || 'thinking'}`;
  let item = stepItems.get(key);

  if (!item) {
    item = document.createElement('div');
    item.className = 'step-item';
    item.innerHTML = `<span class="step-dot running"></span><span class="step-icon">${
      step.type === 'tool_call' ? '🔧' :
      step.type === 'tool_result' ? '📋' : '🤔'
    }</span><span class="step-text"></span>`;
    tracker.appendChild(item);
    stepItems.set(key, item);
  }

  const dot = item.querySelector('.step-dot');
  dot.className = `step-dot ${step.status || 'running'}`;
  item.querySelector('.step-text').textContent =
    step.type === 'thinking' ? (step.status === 'completed' ? '分析完成' : '正在思考...') :
    step.type === 'tool_call' ? (step.status === 'completed' ? `已调用 ${step.name}` : `正在调用 ${step.name}...`) :
    step.type === 'tool_result' ? (step.status === 'error' ? `${step.name} 执行失败` : `${step.name} 完成`) :
    step.content || '';
}

// ---- Sources ----
function renderSources(sources) {
  if (!sources?.length) return null;
  const div = document.createElement('div');
  div.className = 'sources';
  div.innerHTML = `<div class="source-title">📚 参考来源</div>`
    + sources.map(s => `<div class="source-item">• ${escapeHtml(s.title)}${s.section ? ' - ' + escapeHtml(s.section) : ''} <span class="source-score">(${Math.round(s.relevance*100)}%)</span></div>`).join('');
  return div;
}

// ---- Send Message ----
async function sendMessage() {
  if (isStreaming) return;
  const input = document.getElementById('input');
  const message = input.value.trim();
  if (!message) return;

  isStreaming = true;
  document.getElementById('sendBtn').disabled = true;
  input.value = '';
  input.style.height = 'auto';
  stepTracker = null;
  stepItems.clear();
  answerEl = null;

  // Render user message
  const container = document.getElementById('messages');
  container.appendChild(createBubble('user', message));
  scrollToBottom();

  try {
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        sessionId: currentSessionId,
        message,
        stream: true
      })
    });

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let finalResponse = null;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        if (line.startsWith('event: ')) {
          var eventType = line.slice(7).trim();
          continue;
        }
        if (line.startsWith('data: ')) {
          try {
            const data = JSON.parse(line.slice(6));
            handleSSE(eventType, data);
            if (eventType === 'done') finalResponse = data;
          } catch (e) { /* ignore parse errors for partial chunks */ }
        }
      }
    }

    // Post-render: add sources
    if (finalResponse?.sources?.length) {
      const sourcesEl = renderSources(finalResponse.sources);
      if (sourcesEl) container.appendChild(sourcesEl);
    }

    // Update session
    if (finalResponse?.sessionId) {
      currentSessionId = finalResponse.sessionId;
      document.getElementById('chatTitle').textContent = message.slice(0, 30) + (message.length > 30 ? '...' : '');
      addSession(finalResponse.sessionId, message.slice(0, 30));
    }

  } catch (err) {
    container.appendChild(createBubble('assistant', '网络请求失败，请检查服务是否正常运行。'));
  } finally {
    isStreaming = false;
    document.getElementById('sendBtn').disabled = false;
    input.focus();
    scrollToBottom();
  }
}

var sseEventType = '';
function handleSSE(eventType, data) {
  if (eventType === 'step') {
    updateStep(data);
  } else if (eventType === 'content') {
    if (answerEl) answerEl.textContent += data.delta || '';
    else {
      // 可能是拒答场景，直接显示
      answerEl = document.createElement('div');
      answerEl.className = 'msg assistant';
      document.getElementById('messages').appendChild(answerEl);
      answerEl.textContent = data.delta || '';
    }
  }
  // 'done' event handled after loop
  scrollToBottom();
}

// ---- Helpers ----
function onKeyDown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function scrollToBottom() {
  const msgs = document.getElementById('messages');
  msgs.scrollTop = msgs.scrollHeight;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// Auto-resize textarea
document.getElementById('input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});
</script>
</body>
</html>
