services:
  postgres:
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_DB: inplant
      POSTGRES_USER: inplant
      POSTGRES_PASSWORD: inplant
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  pgdata:
